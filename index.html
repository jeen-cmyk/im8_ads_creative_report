<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IM8 Winners</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--border:rgba(255,255,255,.07);--gold:#e8b450;--gold-dim:rgba(232,180,80,.12);--teal:#3ecfb2;--teal-dim:rgba(62,207,178,.1);--purple:#9b7cff;--purple-dim:rgba(155,124,255,.1);--green:#4ade80;--amber:#fb923c;--blue:#60a5fa;--white:#f0f0f8;--muted:#5a5a7a;--l1:#fb923c;--l3:#60a5fa;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 32px 80px;}

/* UPLOAD */
#upload-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;position:relative;z-index:1;}
.upload-title{font-family:'Syne',sans-serif;font-size:clamp(40px,6vw,80px);font-weight:800;letter-spacing:-.03em;line-height:1;text-align:center;margin-bottom:12px;}
.upload-title span{color:var(--gold);}
.upload-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:52px;text-align:center;letter-spacing:.05em;}
.drop-zone{width:100%;max-width:460px;border:1.5px dashed rgba(255,255,255,.12);border-radius:14px;padding:52px 40px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;background:var(--surface);}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--gold);background:rgba(232,180,80,.04);}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:32px;margin-bottom:16px;display:block;}
.drop-zone h3{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--white);}
.drop-zone p{font-size:11px;color:var(--muted);line-height:1.6;}
.upload-hint{margin-top:20px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.upload-hint::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LOADING OVERLAY */
#loading{display:none;position:fixed;inset:0;background:rgba(10,10,15,.85);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px;backdrop-filter:blur(4px);}
#loading.show{display:flex;}
.loading-label{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--white);}
.loading-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.loading-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:4px;}
.loading-fill{height:100%;background:var(--gold);border-radius:1px;animation:loadfill 1.4s ease infinite;}
@keyframes loadfill{0%{width:0%;margin-left:0%}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}

/* DASHBOARD */
#dashboard{display:none;min-height:100vh;}

/* Sticky header */
.dash-header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);}
.dash-top{display:flex;align-items:center;gap:16px;padding:0 32px;height:52px;}
.dash-brand{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--gold);flex-shrink:0;letter-spacing:-.01em;}
.dash-file{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dash-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;display:inline-block;}
.new-btn{font-family:'DM Mono',monospace;font-size:10px;padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;flex-shrink:0;}
.new-btn:hover{border-color:var(--gold);color:var(--gold);}

/* Filters */
.dash-filters{display:flex;align-items:center;gap:6px;padding:10px 32px;flex-wrap:wrap;border-top:1px solid var(--border);}
.fl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.fsep{width:1px;height:14px;background:var(--border);margin:0 4px;}
.pill{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.pill:hover{border-color:var(--gold);color:var(--gold);}
.pill.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.pill.ap.on{background:rgba(251,146,60,.15);border-color:var(--amber);color:var(--amber);}
.pill.tp.on{background:rgba(74,222,128,.1);border-color:var(--green);color:var(--green);}

/* Stats */
.statsbar{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:20px 32px;border-bottom:1px solid var(--border);}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;font-family:'DM Mono',monospace;}
.sv{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1;}

/* Sections */
.cards-wrap{padding:28px 32px;}
.section-head{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.section-head h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;}
.sh-count{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 12px;color:#8888aa;}
.sh-line{flex:1;height:1px;background:var(--border);}
.cards{display:flex;flex-direction:column;gap:6px;margin-bottom:40px;}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s,transform .15s;animation:fadeUp .3s ease both;cursor:pointer;}
.card:hover{border-color:rgba(232,180,80,.25);transform:translateY(-1px);}
.card.open{border-color:rgba(232,180,80,.35);}
.card.untagged{border-left:3px solid var(--amber);}
.card.tagged{border-left:3px solid var(--green);}
.card-main{display:grid;grid-template-columns:110px 1fr auto;align-items:stretch;min-height:64px;}
.card-left{display:flex;flex-direction:column;justify-content:center;gap:4px;padding:10px 14px;border-right:1px solid var(--border);flex-shrink:0;}
.tb{display:inline-flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:3px;width:fit-content;}
.tb.L1{background:rgba(251,146,60,.15);color:var(--l1);border:1px solid rgba(251,146,60,.3);}
.tb.L2{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2);}
.tb.L3{background:rgba(96,165,250,.1);color:var(--l3);border:1px solid rgba(96,165,250,.25);}
.tc{font-size:10px;color:var(--muted);}
.ab{font-size:10px;font-family:'DM Mono',monospace;font-weight:500;padding:2px 7px;border-radius:3px;text-align:center;line-height:1.4;}
.ab.kol{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(62,207,178,.2);}
.ab.icp{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(155,124,255,.2);}
.ab.generic{background:var(--gold-dim);color:var(--gold);}
.card-body{display:flex;flex-direction:column;justify-content:center;padding:10px 18px;gap:3px;min-width:0;}
.an{font-family:'DM Mono',monospace;font-size:11px;color:var(--white);opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mr{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:2px;}
.mi{font-size:11px;color:var(--muted);}
.im{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.im.sp{color:var(--amber);}
.im.ro.great{color:var(--green);font-weight:700;}
.im.ro.good{color:#a3e635;}
.im.ro.ok{color:var(--amber);}
.im.pu{color:var(--white);opacity:.6;}
.ch-wrap{display:flex;align-items:center;padding:0 14px;border-left:1px solid var(--border);}
.ch{color:var(--muted);transition:transform .2s;display:flex;}
.card.open .ch{transform:rotate(180deg);}

/* Expand */
.card-expand{display:none;border-top:1px solid var(--border);background:var(--surface2);padding:16px 18px;flex-direction:column;gap:12px;}
.card.open .card-expand{display:flex;}
.expand-row{display:flex;gap:16px;align-items:flex-start;}
.thumb-wrap{flex-shrink:0;width:72px;height:54px;border-radius:6px;overflow:hidden;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-wrap .no-img{font-size:16px;color:var(--muted);}
.thumb-wrap .thumb-load{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center;padding:4px;}
.expand-details{display:flex;gap:16px;flex-wrap:wrap;flex:1;}
.eg{display:flex;flex-direction:column;gap:2px;min-width:110px;}
.el{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;}
.ev{font-size:11px;color:var(--white);}
.ea{display:flex;gap:8px;flex-wrap:wrap;}
.ea-btn{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:4px 12px;border-radius:6px;text-decoration:none;transition:all .15s;border:1px solid var(--border);color:var(--muted);}
.ea-btn.fb{color:var(--blue);border-color:rgba(96,165,250,.3);background:rgba(96,165,250,.07);}
.ea-btn.fb:hover{background:rgba(96,165,250,.18);}
.ea-btn.lp{color:var(--gold);border-color:rgba(232,180,80,.3);background:var(--gold-dim);}
.ea-btn.lp:hover{background:rgba(232,180,80,.2);}

.empty-state{text-align:center;padding:60px;border:1px dashed var(--border);border-radius:12px;}
.empty-state h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;}
.empty-state p{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
  .wrap,.cards-wrap{padding-left:16px;padding-right:16px;}
  .dash-top,.dash-filters,.statsbar{padding-left:16px;padding-right:16px;}
  .statsbar{grid-template-columns:repeat(3,1fr);}
  .card-main{grid-template-columns:90px 1fr auto;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-label">Processing...</div>
  <div class="loading-sub" id="loading-sub">Reading export</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- Upload -->
<div id="upload-screen">
  <div class="upload-title">IM8 <span>Winners</span></div>
  <div class="upload-sub">Meta Ads · Weekly Review</div>
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".xlsx,.xls">
    <span class="drop-icon">📊</span>
    <h3>Drop your XLS export here</h3>
    <p>Or click to browse<br>Thumbnails + post links load automatically</p>
  </div>
  <div class="upload-hint">Token active — thumbnails enabled</div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="dash-header">
    <div class="dash-top">
      <div class="dash-brand">IM8 Winners</div>
      <div class="dash-file" id="dash-file">—</div>
      <div class="dash-meta"><span class="live-dot"></span>Live</div>
      <button class="new-btn" onclick="resetUpload()">↑ New export</button>
    </div>
    <div class="dash-filters">
      <span class="fl">Status</span>
      <button class="pill on" data-g="status" data-v="all" onclick="setPill(this,'status')">All</button>
      <button class="pill ap" data-g="status" data-v="untagged" onclick="setPill(this,'status')">🔴 Needs Action</button>
      <button class="pill tp" data-g="status" data-v="tagged" onclick="setPill(this,'status')">✅ Tagged</button>
      <div class="fsep"></div>
      <span class="fl">Format</span>
      <button class="pill on" data-g="type" data-v="all" onclick="setPill(this,'type')">All</button>
      <button class="pill" data-g="type" data-v="KOL UGC" onclick="setPill(this,'type')">KOL UGC</button>
      <button class="pill" data-g="type" data-v="Static" onclick="setPill(this,'type')">Static</button>
      <button class="pill" data-g="type" data-v="Video" onclick="setPill(this,'type')">Video</button>
      <button class="pill" data-g="type" data-v="IG Post" onclick="setPill(this,'type')">IG Post</button>
      <button class="pill" data-g="type" data-v="Creator UGC" onclick="setPill(this,'type')">Creator UGC</button>
      <div class="fsep"></div>
      <span class="fl">Tier</span>
      <button class="pill on" data-g="tier" data-v="all" onclick="setPill(this,'tier')">All</button>
      <button class="pill" data-g="tier" data-v="L1" onclick="setPill(this,'tier')">L1</button>
      <button class="pill" data-g="tier" data-v="L3" onclick="setPill(this,'tier')">L3</button>
    </div>
  </div>
  <div class="statsbar" id="statsbar"></div>
  <div class="cards-wrap" id="cards-wrap"></div>
</div>

<script>
// ── HARDCODED TOKEN ───────────────────────────────────
const META_TOKEN = 'EAAVPWRdQkXIBRHX7ZAX0d3czaUKdO0GvwUp34SAHNKJ5jXdqIjrZCLauA7tuxIetxCwkXIvXpBzvlcX87uqngNohqXvdgyb7choqHl5ypZCipemeIx7XsNMgBsnRfrmfPepJQktlssKO6cy4ghaMsxrNlhHX5imK7nVtWSEIexXaD1ppHNuOydZB6pCnZB0Km';
const AD_ACCOUNT = 'act_1000723654649396';
const API_VER    = 'v20.0';

// ── CONSTANTS ─────────────────────────────────────────
const WINNER_POOL_KW=['Winner','Winners','WINNER','TOP30','l7d winner','TOP 50'];
const ICP_KW=['ICP','GLP','Menopause','Collagen','ANGLE','ACTIVE SENIOR','Senior','Cognitive','Immune','Fitness','Sleep','Weight','Gut','Joint','Pill','Energy','Green','Young Prof','Persona','NERMW','HCSS','RECOVERY','Aging Athlete','Performance','FREQUENTFLYER','Traveler','Travel'];
const L3_EXCL=['Retargeting','ENGAGER','ATC','GEISTM'];
const LP_MAP={NOBSLDP:'https://get.im8health.com/pages/no-bs',GLP1LDP:'https://get.im8health.com/pages/glp1',FEELAGAINLDP:'https://get.im8health.com/pages/feel-again',BKMFORMULALDP:'https://get.im8health.com/pages/beckham-formula',WHYIM8LDP:'https://get.im8health.com/pages/why-im8',SENIORSLDP:'https://get.im8health.com/pages/seniors',MENOPAUSELDP:'https://get.im8health.com/pages/menopause','16IN1DRJAMES':'https://get.im8health.com/pages/dr-james',GETGUTLDP:'https://get.im8health.com/for/gut',GETRECOVERYACTLDP:'https://get.im8health.com/recovery/active',GETJOINTSLDP:'https://get.im8health.com/for/joints',GETTRAVELLDP:'https://get.im8health.com/for/travel',SCIENCELDP:'https://get.im8health.com/pages/science',PROOFLDP:'https://get.im8health.com/pages/proof',ACTNOWLDP:'https://get.im8health.com/pages/act-now',GETPDP:'https://get.im8health.com/essentials',HOMEPAGE:'https://im8health.com/',PDP:'https://im8health.com/products/essentials',PROMPTLDP:'https://get.im8health.com/prompt',PROUPGRADELDP:'https://get.im8health.com/pages/pro-upgrade',NOBSLDP2:'https://get.im8health.com/pages/no-bs'};

let allAds=[], filters={status:'all',type:'all',tier:'all'};

// ── HELPERS ───────────────────────────────────────────
const getTier=c=>{const s=String(c);for(const t of['XX','L1','L2','L3'])if(s.startsWith(t))return t;return'OTHER';};
const hasKW=(s,kws)=>kws.some(k=>String(s).toLowerCase().includes(k.toLowerCase()));
const isTagged=n=>/WIN2\d/i.test(String(n));
const fmtUSD=v=>v>0?'$'+Math.round(v).toLocaleString('en-US'):'—';
const fmtROAS=v=>v>0?v.toFixed(2)+'x':'—';
const fmtNum=v=>v>0?Math.round(v).toLocaleString('en-US'):'—';
const rc=r=>r>=2?'great':r>=1.5?'good':'ok';

function adType(n){
  const u=String(n).toUpperCase();
  if(u.includes('KOLUGC')||u.includes('KOL_UGC'))return'KOL UGC';
  if(u.includes('CREATORUGC'))return'Creator UGC';
  if(u.includes('JAMESPOST')||u.includes('IGPOST'))return'IG Post';
  if(['_VID_','_VSL_','_WOTXT_','_TALKH_','_VLOG_'].some(x=>u.includes(x))||u.startsWith('VID_'))return'Video';
  if(u.includes('_IMG_')||u.startsWith('IMG_'))return'Static';
  return'Other';
}
function noteType(adName,adset){
  if(hasKW(adset,ICP_KW))return'icp';
  const u=String(adName).toUpperCase();
  if(u.includes('KOLUGC')||u.includes('KOL_UGC')||u.includes('CREATORUGC'))return'kol';
  return'generic';
}
function getLP(n){
  const toks=String(n).split('_').map(t=>t.replace(/\*/g,'').trim()).reverse();
  for(const t of toks)if(LP_MAP[t])return LP_MAP[t];
  return'';
}

// ── PARSE XLSX ────────────────────────────────────────
function parseSheet(data){
  const wb=XLSX.read(data,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
  if(!rows.length)return[];

  const keys=Object.keys(rows[0]);
  const col=pat=>keys.find(k=>new RegExp(pat,'i').test(k))||'';
  const roasCol  =col('roas');
  const purchCol =col('^purchases$');
  const spendCol =col('amount spent|spend');
  const revCol   =col('conversion value');
  const cpaCol   =col('cost per purchase');
  const ctrCol   =col('ctr|click.through');
  const hookCol  =col('hook');
  const holdCol  =col('hold');
  const urlCol   =col('website url');
  const adIdCol  =col('ad id|^id$');
  const adNameCol=col('ad name');
  const campCol  =col('campaign name');
  const adsetCol =col('ad set name');

  const ads=[];
  for(const row of rows){
    const adName=String(row[adNameCol]||'');
    if(!adName||adName==='Ad name')continue;
    const camp =String(row[campCol]||'');
    const adset=String(row[adsetCol]||'');
    const tier =getTier(camp);
    const tagged=isTagged(adName);
    const roas =parseFloat(row[roasCol])||0;
    const purch=parseFloat(row[purchCol])||0;
    const spend=parseFloat(row[spendCol])||0;
    const rev  =parseFloat(row[revCol])||0;
    const cpa  =parseFloat(row[cpaCol])||0;
    const ctrRaw=parseFloat(row[ctrCol])||0;
    const ctr  =ctrRaw>0&&ctrRaw<1?+(ctrRaw*100).toFixed(2):+ctrRaw.toFixed(2);
    const hook =row[hookCol]?+(parseFloat(row[hookCol])*100).toFixed(1):null;
    const hold =row[holdCol]?+(parseFloat(row[holdCol])*100).toFixed(1):null;
    const url  =String(row[urlCol]||'');
    const adId =String(row[adIdCol]||'');

    if(tier==='XX'||tier==='OTHER')continue;
    if(tier==='L3'&&hasKW(camp,L3_EXCL))continue;
    if(!tagged&&tier==='L1'&&hasKW(adset,WINNER_POOL_KW))continue;
    if(!tagged&&roas<=1.0)continue;
    if(!tagged&&purch<=10)continue;
    if(spend<=0)continue;

    const nt=noteType(adName,adset);
    const lp=getLP(adName)||url;
    ads.push({adId,adName,camp,adset,tier,tagged,roas,purch,spend,rev,cpa,ctr,hook,hold,lp,type:adType(adName),nt,thumbnail:'',fbLink:''});
  }

  ads.sort((a,b)=>{
    if(a.tagged!==b.tagged)return a.tagged?1:-1;
    const o={icp:0,kol:1,generic:2};
    if(!a.tagged&&o[a.nt]!==o[b.nt])return o[a.nt]-o[b.nt];
    return b.roas-a.roas;
  });
  return ads;
}

// ── META API — fetch creatives ────────────────────────
async function fetchCreatives(){
  const ids=[...new Set(allAds.map(a=>a.adId).filter(Boolean))];
  if(!ids.length)return;
  setLoading(true,'Fetching thumbnails from Meta...');

  for(let i=0;i<ids.length;i+=50){
    const batch=ids.slice(i,i+50);
    try{
      const params=new URLSearchParams({
        fields:'id,creative{thumbnail_url,effective_object_story_id}',
        filtering:JSON.stringify([{field:'id',operator:'IN',value:batch}]),
        limit:50,
        access_token:META_TOKEN
      });
      const res=await fetch(`https://graph.facebook.com/${API_VER}/${AD_ACCOUNT}/ads?${params}`);
      const data=await res.json();
      if(!data.data)continue;
      for(const ad of data.data){
        const cr=ad.creative||{};
        const thumb=cr.thumbnail_url||'';
        const storyId=cr.effective_object_story_id||'';
        let fbLink='';
        if(storyId){const p=storyId.split('_',2);if(p.length===2)fbLink=`https://www.facebook.com/permalink.php?story_fbid=${p[1]}&id=${p[0]}`;}
        allAds.forEach(a=>{if(a.adId===ad.id){a.thumbnail=thumb;a.fbLink=fbLink;}});
      }
    }catch(e){console.warn('Creative fetch:',e);}
  }
}

// ── RENDER ────────────────────────────────────────────
function setLoading(show,sub=''){
  const el=document.getElementById('loading');
  if(show)el.classList.add('show');else el.classList.remove('show');
  if(sub)document.getElementById('loading-sub').textContent=sub;
}

async function handleFile(file){
  if(!file)return;
  setLoading(true,'Reading export...');
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      allAds=parseSheet(new Uint8Array(e.target.result));
      setLoading(false);
      renderDashboard(file.name);
      // fetch creatives in background
      await fetchCreatives();
      applyFilters(); // re-render with thumbnails
    }catch(err){
      setLoading(false);
      alert('Error: '+err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderDashboard(filename){
  document.getElementById('upload-screen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('dash-file').textContent=filename;
  applyFilters();
}

function applyFilters(){
  const f=filters;
  const filtered=allAds.filter(ad=>{
    if(f.status==='untagged'&&ad.tagged)return false;
    if(f.status==='tagged'&&!ad.tagged)return false;
    if(f.type!=='all'&&ad.type!==f.type)return false;
    if(f.tier!=='all'&&ad.tier!==f.tier)return false;
    return true;
  });
  renderStats(filtered);
  renderCards(filtered);
}

function renderStats(ads){
  const untagged=ads.filter(a=>!a.tagged).length;
  const tagged=ads.filter(a=>a.tagged).length;
  const avgRoas=ads.length?(ads.reduce((s,a)=>s+a.roas,0)/ads.length).toFixed(2)+'x':'—';
  const totalRev=ads.reduce((s,a)=>s+a.rev,0);
  const totalP=ads.reduce((s,a)=>s+a.purch,0);
  document.getElementById('statsbar').innerHTML=[
    {l:'Needs Action',v:untagged,c:'var(--amber)'},
    {l:'Tagged',v:tagged,c:'var(--green)'},
    {l:'Avg ROAS',v:avgRoas,c:'var(--gold)'},
    {l:'Total Purchases',v:fmtNum(totalP),c:'var(--white)'},
    {l:'Revenue',v:fmtUSD(totalRev),c:'var(--green)'},
  ].map(s=>`<div class="sc"><div class="sl">${s.l}</div><div class="sv" style="color:${s.c}">${s.v}</div></div>`).join('');
}

function renderCards(ads){
  const wrap=document.getElementById('cards-wrap');
  if(!ads.length){
    wrap.innerHTML=`<div class="empty-state"><h3>No ads match</h3><p>Try adjusting the filters above</p></div>`;
    return;
  }

  const untagged=ads.filter(a=>!a.tagged);
  const tagged=ads.filter(a=>a.tagged);
  const ntLabel={icp:'ICP — Tag only',kol:'Dupe → Pool',generic:'Dupe → Pool'};

  function buildCard(ad){
    const fbBtn=ad.fbLink?`<a class="ea-btn fb" href="${ad.fbLink}" target="_blank" onclick="event.stopPropagation()"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> View Post</a>`:'';
    const lpBtn=ad.lp?`<a class="ea-btn lp" href="${ad.lp}" target="_blank" onclick="event.stopPropagation()">↗ Landing Page</a>`:'';
    const thumbEl=ad.thumbnail?`<img src="${ad.thumbnail}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\"no-img\\">📷</div>'">`:`<div class="no-img">📷</div>`;

    return `<div class="card ${ad.tagged?'tagged':'untagged'}" onclick="toggleCard(this)">
      <div class="card-main">
        <div class="card-left">
          <span class="tb ${ad.tier}">${ad.tier}</span>
          <span class="tc">${ad.type}</span>
          <span class="ab ${ad.nt}">${ntLabel[ad.nt]}</span>
        </div>
        <div class="card-body">
          <div class="an" title="${ad.adName}">${ad.adName}</div>
          <div class="mr">
            <span class="im sp">${fmtUSD(ad.spend)}</span>
            <span class="im ro ${rc(ad.roas)}">ROAS ${fmtROAS(ad.roas)}</span>
            <span class="im pu">${fmtNum(ad.purch)} purchases</span>
          </div>
        </div>
        <div class="ch-wrap"><div class="ch"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 5l5 5 5-5"/></svg></div></div>
      </div>
      <div class="card-expand">
        <div class="expand-row">
          <div class="thumb-wrap">${thumbEl}</div>
          <div class="expand-details">
            <div class="eg"><div class="el">Campaign</div><div class="ev">${ad.camp}</div></div>
            <div class="eg"><div class="el">Ad Set</div><div class="ev">${ad.adset}</div></div>
            <div class="eg"><div class="el">Revenue</div><div class="ev" style="color:var(--green)">${fmtUSD(ad.rev)}</div></div>
            <div class="eg"><div class="el">CPA</div><div class="ev">${fmtUSD(ad.cpa)}</div></div>
            ${ad.ctr?`<div class="eg"><div class="el">CTR</div><div class="ev">${ad.ctr}%</div></div>`:''}
            ${ad.hook!=null?`<div class="eg"><div class="el">Hook Rate</div><div class="ev">${ad.hook}%</div></div>`:''}
            ${ad.hold!=null?`<div class="eg"><div class="el">Hold Rate</div><div class="ev">${ad.hold}%</div></div>`:''}
            <div class="eg"><div class="el">Status</div><div class="ev" style="color:${ad.tagged?'var(--green)':'var(--amber)'}">${ad.tagged?'✅ WIN Tagged':'⚡ Needs Action'}</div></div>
          </div>
        </div>
        ${(fbBtn||lpBtn)?`<div class="ea">${fbBtn}${lpBtn}</div>`:''}
      </div>
    </div>`;
  }

  let html='';
  if(untagged.length){
    html+=`<div class="section-head"><h2>🔴 Needs Action</h2><div class="sh-count">${untagged.length} ads</div><div class="sh-line"></div></div><div class="cards">${untagged.map(buildCard).join('')}</div>`;
  }
  if(tagged.length){
    html+=`<div class="section-head"><h2>✅ Already Tagged</h2><div class="sh-count">${tagged.length} ads</div><div class="sh-line"></div></div><div class="cards">${tagged.map(buildCard).join('')}</div>`;
  }
  wrap.innerHTML=html;
  document.querySelectorAll('.card').forEach((c,i)=>c.style.animationDelay=Math.min(i,30)*0.018+'s');
}

function toggleCard(card){
  const wasOpen=card.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(c=>c.classList.remove('open'));
  if(!wasOpen)card.classList.add('open');
}

function setPill(btn,group){
  document.querySelectorAll(`[data-g="${group}"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  filters[group]=btn.dataset.v;
  applyFilters();
}

function resetUpload(){
  allAds=[];
  document.getElementById('dashboard').style.display='none';
  document.getElementById('upload-screen').style.display='flex';
  document.getElementById('file-input').value='';
}

// ── FILE EVENTS ───────────────────────────────────────
document.getElementById('file-input').addEventListener('change',e=>handleFile(e.target.files[0]));
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);});
</script>
</body>
</html>
